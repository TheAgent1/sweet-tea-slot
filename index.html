<style>
/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold-bright:#ffe55a;
  --gold-mid:#f5c000;
  --gold-dark:#b87a00;
  --gold-shadow:#7a4d00;
  --pink-bright:#ff6eb5;
  --pink-mid:#e8006e;
  --pink-dark:#8a0040;
  --sky-top:#5ab8ff;
  --sky-bot:#c9eaff;
  --candy-bg:#ffc8e8;
  --green-top:#52d440;
  --green-bot:#1a8a0a;
  --ui-dark:rgba(10,0,35,0.82);
  --ui-border:rgba(255,210,80,0.6);
  --cell-bg-a:rgba(255,230,255,0.22);
  --cell-bg-b:rgba(200,140,255,0.12);
}

html,body{width:100%;height:100%;overflow:hidden;}
body{
  font-family:'Lilita One',cursive;
  background:#0a0018;
  display:block;
  position:relative;
}
#game-shell{ transform-origin: top left; position:absolute; }

/* ═══════════════════════════════════════════════
   BACKGROUND — CANDY LAND SKY
═══════════════════════════════════════════════ */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ═══════════════════════════════════════════════
   GAME SHELL
═══════════════════════════════════════════════ */
#game-shell{
  position:relative;z-index:10;
  width:min(98vw,1080px);
  display:flex;flex-direction:column;align-items:center;
  gap:0;
}

/* ── TOP BRAND BAR ── */
#brand-bar{
  width:100%;
  display:flex;align-items:center;justify-content:center;
  padding:6px 0 4px;
  position:relative;
}
#game-logo{
  font-size:clamp(18px,3.2vw,34px);
  color:var(--gold-bright);
  text-shadow:0 0 20px rgba(255,220,60,.9),0 3px 0 var(--gold-dark),0 6px 12px rgba(0,0,0,.7);
  letter-spacing:2px;
  -webkit-text-stroke:1px var(--gold-dark);
}
#game-logo span{color:#fff;-webkit-text-stroke:1px rgba(200,100,0,.5);}


/* ── MAIN STAGE ── */
#stage{
  width:100%;
  display:flex;gap:10px;align-items:stretch;
  padding:0 8px;
}

/* ═══════════════════════════════════════════════
   LEFT PANEL
═══════════════════════════════════════════════ */
#left-panel{
  width:clamp(130px,14vw,155px);flex-shrink:0;
  display:flex;flex-direction:column;gap:7px;
  padding:4px 0;
}

/* ── BUY BUTTONS ── */
.buy-card{
  border-radius:14px;padding:9px 7px 8px;text-align:center;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform .14s ease,filter .14s;
  border:2.5px solid;
}
.buy-card::before{/* shimmer */
  content:'';position:absolute;top:0;left:-80%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
  animation:shimmer 2.6s ease-in-out infinite;
}
@keyframes shimmer{0%{left:-80%}100%{left:140%}}
.buy-card:hover{transform:scale(1.04) translateY(-1px);filter:brightness(1.1);}
.buy-card:active{transform:scale(.98);}
.buy-card.pink{
  background:linear-gradient(160deg,#ff6eb5 0%,#cc006a 55%,#8a003e 100%);
  border-color:#ff9dd4;
  box-shadow:0 6px 22px rgba(200,0,100,.55),inset 0 1px 0 rgba(255,255,255,.35);
}
.buy-card.orange{
  background:linear-gradient(160deg,#ffad40 0%,#e06000 55%,#8a3000 100%);
  border-color:#ffcf7a;
  box-shadow:0 6px 22px rgba(200,90,0,.55),inset 0 1px 0 rgba(255,255,255,.35);
}
.buy-card .bc-label{font-size:9.5px;letter-spacing:1.2px;color:rgba(255,255,255,.88);font-family:'Nunito',sans-serif;font-weight:900;line-height:1.3;}
.buy-card .bc-super{font-size:17px;color:var(--gold-bright);display:block;line-height:1;text-shadow:0 2px 6px rgba(0,0,0,.5);}
.buy-card .bc-price{font-size:20px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.6);line-height:1.15;}

/* ── BET PANEL ── */
#bet-panel{
  background:linear-gradient(160deg,#1c7a22 0%,#0d4a12 100%);
  border:2.5px solid #5dd462;border-radius:14px;padding:9px 7px;
  text-align:center;
  box-shadow:0 5px 18px rgba(60,180,60,.4),inset 0 1px 0 rgba(255,255,255,.2);
}
#bet-panel .bp-label{font-size:9px;color:#b8ffb8;font-family:'Nunito',sans-serif;font-weight:900;letter-spacing:1px;}
#bet-panel .bp-amount{font-size:26px;color:var(--gold-bright);text-shadow:0 2px 8px rgba(0,0,0,.5);line-height:1.1;}
#bet-panel .bp-sub{font-size:9px;color:#a0ffa0;font-family:'Nunito',sans-serif;font-weight:800;line-height:1.3;margin-top:2px;}
#double-btn{
  display:flex;align-items:center;justify-content:center;gap:5px;
  margin:5px auto 0;width:fit-content;
  background:rgba(0,0,0,.35);border:2px solid #444;border-radius:20px;
  padding:3px 10px;color:#ccc;font-size:11px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:900;transition:all .2s;
}
#double-btn.on{background:rgba(0,150,0,.4);border-color:#5dd462;color:#b8ffb8;}
#double-btn .db-dot{width:8px;height:8px;border-radius:50%;background:#555;transition:background .2s;}
#double-btn.on .db-dot{background:#5dd462;}

/* ── MULTIPLIER BOX ── */
#mult-box{
  background:linear-gradient(160deg,rgba(20,5,60,.9),rgba(5,0,25,.95));
  border:2px solid rgba(255,210,80,.4);border-radius:14px;
  padding:8px 7px;text-align:center;
  box-shadow:0 0 24px rgba(255,200,0,.1),inset 0 0 20px rgba(255,200,0,.04);
}
#mult-box .mb-label{font-size:9px;color:rgba(255,255,255,.5);font-family:'Nunito',sans-serif;font-weight:800;letter-spacing:.8px;}
#mult-val{
  font-size:30px;color:var(--gold-bright);
  text-shadow:0 0 20px rgba(255,220,60,.8),0 2px 0 var(--gold-dark);
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),color .25s;
}
#mult-val.bump{animation:multBump .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes multBump{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}

/* ── PAYTABLE ── */
#paytable{
  background:rgba(0,0,0,.45);border:1px solid rgba(255,210,80,.2);
  border-radius:12px;padding:6px 8px;flex:1;overflow:hidden;
}
.pt-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:2.5px 0;border-bottom:1px solid rgba(255,255,255,.06);
}
.pt-row:last-child{border:none;}
.pt-icon{width:26px;height:26px;flex-shrink:0;}
.pt-data{text-align:right;}
.pt-sym-name{font-size:8.5px;color:rgba(255,255,255,.45);font-family:'Nunito',sans-serif;font-weight:700;display:block;}
.pt-pay{font-size:9.5px;color:var(--gold-bright);font-family:'Nunito',sans-serif;font-weight:900;}
#rtp-line{text-align:center;font-size:9px;color:rgba(255,255,255,.3);font-family:'Nunito',sans-serif;font-weight:700;margin-top:4px;letter-spacing:.5px;}

/* ═══════════════════════════════════════════════
   MAIN GAME
═══════════════════════════════════════════════ */
#main-game{flex:1;display:flex;flex-direction:column;gap:7px;}

/* ── BANNER ── */
#pays-banner{
  text-align:center;padding:5px 12px;border-radius:10px;
  background:linear-gradient(90deg,rgba(255,210,50,.04),rgba(255,210,50,.16),rgba(255,210,50,.04));
  border:1.5px solid rgba(255,210,50,.35);
  font-size:clamp(10px,1.6vw,13px);letter-spacing:2.5px;
  color:var(--gold-bright);font-family:'Nunito',sans-serif;font-weight:900;text-transform:uppercase;
  text-shadow:0 0 12px rgba(255,210,50,.5);
}

/* ── FREE SPIN BAR ── */
#fs-bar{
  display:none;text-align:center;padding:6px;border-radius:10px;
  background:linear-gradient(90deg,rgba(255,190,0,.08),rgba(255,190,0,.22),rgba(255,190,0,.08));
  border:2px solid var(--gold-mid);
  font-size:14px;color:var(--gold-bright);font-family:'Nunito',sans-serif;font-weight:900;
  animation:fsGlow 1.1s ease-in-out infinite alternate;
}
#fs-bar.show{display:block;}
@keyframes fsGlow{
  from{box-shadow:0 0 6px rgba(255,200,0,.3);}
  to{box-shadow:0 0 24px rgba(255,200,0,.9),0 0 48px rgba(255,160,0,.4);}
}

/* ── REEL FRAME ── */
#reel-wrap{
  position:relative;border-radius:18px;
  padding:3px;/* gold ring */
  background:linear-gradient(145deg,#ffe066,#f5a800,#c87000,#f5a800,#ffe066);
  box-shadow:0 0 0 1px rgba(255,240,120,.3),
             0 0 60px rgba(255,180,0,.35),
             0 8px 40px rgba(0,0,0,.6),
             inset 0 0 0 2px rgba(255,240,120,.15);
}
#reel-inner{
  border-radius:16px;overflow:hidden;
  background:linear-gradient(160deg,rgba(210,150,255,.18) 0%,rgba(255,180,230,.14) 50%,rgba(150,100,255,.18) 100%);
  padding:10px;
  position:relative;
}
/* subtle candy-sky tint overlay inside reels */
#reel-inner::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% -10%,rgba(255,255,255,.13) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}

/* ── GRID ── */
#grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  grid-template-rows:repeat(5,1fr);
  gap:6px;
  position:relative;z-index:1;
}

/* ── CELL ── */
.cell{
  width:100%;aspect-ratio:1;
  position:relative;border-radius:12px;overflow:visible;
  cursor:default;user-select:none;
}
/* cell background tile */
.cell-bg{
  position:absolute;inset:0;border-radius:12px;overflow:hidden;
  background:radial-gradient(ellipse at 45% 30%,rgba(255,255,255,.2),rgba(220,160,255,.08) 55%,rgba(80,20,180,.15));
  border:1.5px solid rgba(255,255,255,.22);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.28),
    inset 0 -2px 0 rgba(0,0,0,.32),
    0 3px 10px rgba(0,0,0,.45);
}
/* top glass sheen */
.cell-bg::before{
  content:'';position:absolute;top:0;left:0;right:0;height:46%;
  background:linear-gradient(180deg,rgba(255,255,255,.22) 0%,transparent 100%);
  border-radius:10px 10px 0 0;pointer-events:none;
}
/* bottom ambient */
.cell-bg::after{
  content:'';position:absolute;bottom:0;left:8%;right:8%;height:22%;
  background:linear-gradient(0deg,rgba(255,255,255,.08),transparent);
  pointer-events:none;
}
/* symbol SVG */
.cell-sym{
  position:absolute;inset:3px;z-index:2;
  display:flex;align-items:center;justify-content:center;
}
.cell-sym svg{width:100%;height:100%;filter:drop-shadow(0 4px 10px rgba(0,0,0,.6));}
/* top glare over symbol */
.cell-glare{
  position:absolute;inset:0;border-radius:12px;z-index:3;pointer-events:none;
  background:radial-gradient(ellipse at 40% 18%,rgba(255,255,255,.3) 0%,rgba(255,255,255,.08) 35%,transparent 65%);
}

/* win state */
.cell.winning .cell-bg{
  background:radial-gradient(ellipse at 50% 40%,rgba(255,230,80,.35),rgba(255,180,0,.15));
  border-color:var(--gold-bright);
  box-shadow:0 0 0 2.5px var(--gold-bright),0 0 30px rgba(255,220,0,.85),inset 0 0 18px rgba(255,200,0,.25);
}
.cell.winning{animation:winPop .48s cubic-bezier(.34,1.56,.64,1);z-index:10;}
@keyframes winPop{0%{transform:scale(1)}40%{transform:scale(1.26)}72%{transform:scale(.94)}100%{transform:scale(1.1)}}

/* drop in */
.cell.drop .cell-bg,.cell.drop .cell-sym,.cell.drop .cell-glare{
  animation:dropIn .42s cubic-bezier(.22,1.4,.6,1) both;
}
@keyframes dropIn{0%{transform:translateY(-65px) scale(.85);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}

/* pop out */
.cell.removing .cell-bg,.cell.removing .cell-sym,.cell.removing .cell-glare{
  animation:popOut .32s ease-in forwards;
}
@keyframes popOut{
  0%{transform:scale(1.1);opacity:1;}
  45%{transform:scale(1.55) rotate(14deg);opacity:.5;}
  100%{transform:scale(0) rotate(25deg);opacity:0;}
}

/* scatter glow idle */
.cell.scatter-idle .cell-bg{
  border-color:rgba(255,180,220,.7);
  box-shadow:0 0 18px rgba(255,100,180,.6),inset 0 0 10px rgba(255,100,180,.2);
  animation:scatterPulse 1.6s ease-in-out infinite alternate;
}
@keyframes scatterPulse{
  from{box-shadow:0 0 10px rgba(255,100,180,.4);}
  to{box-shadow:0 0 28px rgba(255,100,180,.9),0 0 0 2px rgba(255,150,200,.6);}
}

/* ══ BOTTOM BAR ══ */
#bottom-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,rgba(8,0,28,.88),rgba(15,4,40,.9));
  border:2px solid rgba(255,210,80,.2);border-radius:15px;
  padding:9px 16px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 4px 20px rgba(0,0,0,.5);
}
.cred-block{display:flex;flex-direction:column;gap:3px;}
.cred-row{display:flex;gap:8px;align-items:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(11px,1.4vw,14px);}
.cred-lbl{color:var(--gold-mid);}
.cred-val{color:#fff;}

/* win message */
#win-msg{
  font-size:clamp(14px,2vw,20px);color:var(--gold-bright);
  text-shadow:0 0 16px rgba(255,220,60,.6);
  text-align:center;min-width:180px;
  font-family:'Nunito',sans-serif;font-weight:900;
  transition:color .3s;letter-spacing:.5px;
}
#win-msg.big{animation:bigPulse .65s ease-in-out infinite alternate;color:#fff;}
@keyframes bigPulse{
  from{text-shadow:0 0 16px rgba(255,220,60,.7);transform:scale(1);}
  to{text-shadow:0 0 40px #ffd700,0 0 80px rgba(255,165,0,.7);transform:scale(1.07);}
}

/* spin controls */
.spin-area{display:flex;align-items:center;gap:10px;}
.adj-wrap{display:flex;flex-direction:column;gap:5px;align-items:center;}
.bet-label{font-size:9px;color:rgba(255,255,255,.4);font-family:'Nunito',sans-serif;font-weight:800;}

.adj-btn{
  width:36px;height:36px;border-radius:50%;cursor:pointer;
  background:radial-gradient(circle at 40% 35%,#666,#2a2a2a);
  border:2px solid rgba(255,255,255,.18);color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:all .14s;box-shadow:0 3px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.18);
  font-family:'Lilita One',cursive;
}
.adj-btn:hover{background:radial-gradient(circle at 40% 35%,#888,#444);transform:scale(1.1);}

/* spin button — the big one */
#spin-btn{
  width:clamp(58px,7vw,70px);height:clamp(58px,7vw,70px);
  border-radius:50%;cursor:pointer;
  background:radial-gradient(circle at 38% 32%,#ccc 0%,#888 40%,#444 100%);
  border:4px solid #aaa;color:#fff;font-size:28px;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
  box-shadow:0 6px 22px rgba(0,0,0,.65),inset 0 2px 0 rgba(255,255,255,.35),inset 0 -2px 0 rgba(0,0,0,.3);
  font-family:'Lilita One',cursive;
}
#spin-btn:hover:not(:disabled){transform:scale(1.1);box-shadow:0 9px 30px rgba(0,0,0,.8);}
#spin-btn:active:not(:disabled){transform:scale(.96);}
#spin-btn:disabled{opacity:.4;cursor:not-allowed;}
#spin-btn.spinning{animation:spinRot .55s linear infinite;}
@keyframes spinRot{to{transform:rotate(360deg)}}

#auto-btn{
  background:rgba(0,0,0,.38);border:2px solid rgba(255,255,255,.18);
  border-radius:20px;color:rgba(255,255,255,.75);padding:5px 11px;font-size:10.5px;
  cursor:pointer;font-family:'Nunito',sans-serif;font-weight:900;
  transition:all .15s;letter-spacing:.5px;
}
#auto-btn:hover,#auto-btn.on{border-color:var(--gold-mid);color:var(--gold-bright);}

/* ═══════════════════════════════════════════════
   WIN OVERLAY
═══════════════════════════════════════════════ */
#win-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.88);backdrop-filter:blur(6px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#win-overlay.show{display:flex;}
#ov-rays{
  position:absolute;inset:0;pointer-events:none;
  background:conic-gradient(from 0deg at 50% 48%,
    transparent 0deg, rgba(255,200,0,.06) 10deg, transparent 20deg,
    transparent 30deg, rgba(255,200,0,.06) 40deg, transparent 50deg,
    transparent 60deg, rgba(255,200,0,.06) 70deg, transparent 80deg,
    transparent 90deg, rgba(255,200,0,.06) 100deg, transparent 110deg,
    transparent 120deg, rgba(255,200,0,.06) 130deg, transparent 140deg,
    transparent 150deg, rgba(255,200,0,.06) 160deg, transparent 170deg,
    transparent 180deg, rgba(255,200,0,.06) 190deg, transparent 200deg,
    transparent 210deg, rgba(255,200,0,.06) 220deg, transparent 230deg,
    transparent 240deg, rgba(255,200,0,.06) 250deg, transparent 260deg,
    transparent 270deg, rgba(255,200,0,.06) 280deg, transparent 290deg,
    transparent 300deg, rgba(255,200,0,.06) 310deg, transparent 320deg,
    transparent 330deg, rgba(255,200,0,.06) 340deg, transparent 350deg
  );
  animation:rayRotate 8s linear infinite;
}
@keyframes rayRotate{to{transform:rotate(360deg)}}
#ov-type{
  font-size:clamp(16px,4vw,28px);color:var(--gold-bright);
  font-family:'Nunito',sans-serif;font-weight:900;
  letter-spacing:4px;text-transform:uppercase;
  text-shadow:0 2px 0 var(--gold-dark);opacity:.8;
}
#ov-title{
  font-size:clamp(50px,10vw,100px);color:#fff;
  text-shadow:0 0 40px #ffd700,0 0 80px rgba(255,160,0,.7),0 6px 0 var(--gold-dark),0 12px 0 rgba(0,0,0,.4);
  -webkit-text-stroke:2px var(--gold-mid);
  animation:ovPop .55s cubic-bezier(.34,1.56,.64,1);
  line-height:1;text-align:center;
}
#ov-amount{
  font-size:clamp(28px,5vw,54px);color:var(--gold-bright);
  text-shadow:0 0 30px rgba(255,220,0,.8),0 4px 0 var(--gold-dark);
  animation:countUp .8s ease-out;font-family:'Nunito',sans-serif;font-weight:900;
}
@keyframes ovPop{0%{transform:scale(.15) rotate(-6deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes countUp{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
#ov-collect{
  background:linear-gradient(160deg,#ff6eb5,#cc006a,#8a003e);
  border:3px solid #ff9dd4;border-radius:34px;padding:13px 44px;
  color:#fff;font-size:clamp(18px,2.5vw,24px);
  cursor:pointer;font-family:'Lilita One',cursive;
  box-shadow:0 6px 28px rgba(200,0,100,.6),inset 0 1px 0 rgba(255,255,255,.3);
  transition:all .18s;letter-spacing:1px;
}
#ov-collect:hover{transform:scale(1.06);box-shadow:0 9px 36px rgba(200,0,100,.8);}

/* ═══════════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════════ */
#particle-canvas{position:fixed;inset:0;z-index:400;pointer-events:none;}
</style>
</head>
<body>

<!-- Background candy-land scene -->
<canvas id="bg-canvas"></canvas>
<!-- Particle effects -->
<canvas id="particle-canvas"></canvas>

<!-- Win Overlay -->
<div id="win-overlay">
  <div id="ov-rays"></div>
  <div id="ov-type">BIG WIN</div>
  <div id="ov-title" id="ov-title">🍭</div>
  <div id="ov-amount">$0.00</div>
  <button id="ov-collect" onclick="closeOverlay()">COLLECT!</button>
</div>

<div id="game-shell">
  <div id="brand-bar">
    <div id="game-logo">SWEET TEA <span>1000</span></div>
  </div>

  <div id="stage">
    <!-- LEFT PANEL -->
    <div id="left-panel">

// ═══════════════════════════════════════════════════════════════════
//  BACKGROUND CANVAS — candy-land sky with clouds & ground
// ═══════════════════════════════════════════════════════════════════
(function(){
  const cv=document.getElementById('bg-canvas');
  const cx=cv.getContext('2d');
  let W,H,clouds=[];

  function resize(){
    W=cv.width=innerWidth; H=cv.height=innerHeight;
    clouds=[];
    for(let i=0;i<9;i++) clouds.push({
      x:Math.random()*W, y:60+Math.random()*H*.28,
      r:40+Math.random()*70, s:.3+Math.random()*.5,
      alpha:.12+Math.random()*.18
    });
  }
  resize(); window.addEventListener('resize',resize);

  function drawCloud(x,y,r,alpha){
    cx.save();cx.globalAlpha=alpha;
    const g=cx.createRadialGradient(x,y,0,x,y,r*1.4);
    g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(1,'rgba(255,240,255,0)');
    cx.fillStyle=g;
    cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(x+r*.55,y+r*.15,r*.72,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(x-r*.5,y+r*.2,r*.68,0,Math.PI*2);cx.fill();
    cx.restore();
  }

  let t=0;
  function draw(){
    t+=.004;
    // sky gradient
    const sky=cx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#6ac8ff');
    sky.addColorStop(.45,'#c0e8ff');
    sky.addColorStop(.7,'#ffd6f0');
    sky.addColorStop(1,'#cc88dd');
    cx.fillStyle=sky; cx.fillRect(0,0,W,H);

    // sun glow
    const sun=cx.createRadialGradient(W*.82,H*.08,0,W*.82,H*.08,200);
    sun.addColorStop(0,'rgba(255,255,200,.65)');sun.addColorStop(1,'rgba(255,220,100,0)');
    cx.fillStyle=sun;cx.fillRect(0,0,W,H);

    // clouds
    clouds.forEach(c=>{
      c.x-=c.s; if(c.x<-200) c.x=W+200;
      drawCloud(c.x,c.y,c.r,c.alpha);
    });

    // candy-land ground stripe
    const gnd=cx.createLinearGradient(0,H*.78,0,H);
    gnd.addColorStop(0,'rgba(200,80,220,.55)');
    gnd.addColorStop(1,'rgba(140,30,180,.7)');
    cx.fillStyle=gnd;
    cx.fillRect(0,H*.78,W,H);

    // pink candy swirl hills
    for(let i=0;i<4;i++){
      const hx=W*(i*.28-.05)+Math.sin(t+i)*30;
      const hy=H*.82+Math.cos(t*.7+i)*12;
      const hr=90+i*35;
      const hill=cx.createRadialGradient(hx,hy+hr*.4,0,hx,hy+hr*.4,hr);
      hill.addColorStop(0,'rgba(255,140,220,.55)');hill.addColorStop(1,'rgba(255,80,180,0)');
      cx.fillStyle=hill;cx.beginPath();cx.arc(hx,hy+hr*.4,hr,0,Math.PI*2);cx.fill();
    }

    // candy canes (static decor)
    drawCandyCane(cx,W*.04,H*.72,H*.22);
    drawCandyCane(cx,W*.96,H*.70,H*.25);

    requestAnimationFrame(draw);
  }

  function drawCandyCane(cx,x,y,h){
    const w=h*.09;
    cx.save();cx.lineWidth=w;cx.lineCap='round';
    // stripe pattern
    const segs=6;
    for(let i=0;i<segs;i++){
      cx.strokeStyle=i%2===0?'rgba(255,255,255,.6)':'rgba(255,60,80,.55)';
      cx.beginPath();cx.moveTo(x,y-h*(i/segs));cx.lineTo(x,y-h*((i+1)/segs));cx.stroke();
    }
    // hook
    cx.strokeStyle='rgba(255,255,255,.5)';
    cx.beginPath();cx.arc(x-h*.06,y-h+h*.06,h*.06,Math.PI,0,true);cx.stroke();
    cx.restore();
  }

  draw();
})();

//  PARTICLE CANVAS
// ═══════════════════════════════════════════════════════════════════
const partCv=document.getElementById('particle-canvas');
const partCx=partCv.getContext('2d');
partCv.width=innerWidth; partCv.height=innerHeight;
window.addEventListener('resize',()=>{partCv.width=innerWidth;partCv.height=innerHeight;});
let particles=[];
function spawnParticles(x,y,count=18,colors=['#ffd700','#ff4da6','#00e5ff','#7fff00','#ff8c00']){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=3+Math.random()*6;
    particles.push({
      x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-3,
      r:4+Math.random()*6,alpha:1,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360,vrot:(Math.random()-.5)*12
    });
  }
}
(function animPart(){
  partCx.clearRect(0,0,partCv.width,partCv.height);
  particles=particles.filter(p=>p.alpha>0.02);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=.22; p.alpha-=.018; p.rot+=p.vrot;
    partCx.save();partCx.globalAlpha=p.alpha;
    partCx.translate(p.x,p.y);partCx.rotate(p.rot*Math.PI/180);
    partCx.fillStyle=p.color;
    partCx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6);
    partCx.restore();
  }
  requestAnimationFrame(animPart);
})();

function burstConfetti(){
  const cx2=partCv.width/2, cy2=partCv.height/2;
  for(let i=0;i<5;i++) setTimeout(()=>{
    spawnParticles(cx2+Math.random()*200-100, cy2+Math.random()*100-50, 30);
  },i*180);
}

const SYM_KEYS=['GRAPE','WATERMELON','BANANA','APPLE','PEACH','PURPLE','BLUE','HEART'];
const SCATTER='LOLLIPOP';
const SYM_NAMES={GRAPE:'Grapes',WATERMELON:'Watermelon',BANANA:'Banana',APPLE:'Apple',PEACH:'Peach',PURPLE:'Purple Candy',BLUE:'Blue Candy',HEART:'Heart Candy',LOLLIPOP:'Lollipop'};

const PAY={
  GRAPE:      {8:.4,9:.6,10:.8,11:1,12:2,13:3,14:4,15:5},
  WATERMELON: {8:.4,9:.6,10:.8,11:1,12:2,13:3,14:4,15:5},
  BANANA:     {8:.5,9:.8,10:1.2,11:1.5,12:3,13:5,14:7,15:9},
  APPLE:      {8:.6,9:.9,10:1.4,11:2,12:4,13:6,14:8,15:10},
  PEACH:      {8:.8,9:1.2,10:2,11:3,12:8,13:12,14:15,15:18},
  PURPLE:     {8:1,9:1.5,10:2.5,11:4,12:15,13:20,14:25,15:30},
  BLUE:       {8:2,9:3,10:5,11:8,12:25,13:40,14:60,15:80},
  HEART:      {8:3,9:5,10:8,11:12,12:50,13:80,14:120,15:200},
};

// ═══════════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════════
const BETS=[0.20,0.40,0.60,0.80,1,1.25,1.50,2,2.50,3,4,5,6,8,10];
let betIdx=7, credit=99998, isSpinning=false, isAuto=false;
let freeSpins=0, isFSMode=false, roundWin=0, totalMult=1, doubleOn=false;
let grid=[];
const ROWS=5, COLS=6;

// ── BUILD PAYTABLE ──
function buildPaytable(){
  const el=document.getElementById('paytable');
  const order=['HEART','BLUE','PURPLE','PEACH','APPLE','BANANA','WATERMELON','GRAPE','LOLLIPOP'];
  el.innerHTML=order.map(k=>{
    const iconSvg=SYMS[k]?SYMS[k].replace('<svg ','<svg class="pt-icon" '):SYMS[k]||'';
    const payStr=k===SCATTER?'BONUS TRIGGER':`8×:${PAY[k][8]}  12×:${PAY[k][12]}`;
    return `<div class="pt-row">
      <span class="pt-icon">${iconSvg}</span>
      <div class="pt-data"><span class="pt-sym-name">${SYM_NAMES[k]}</span><span class="pt-pay">${payStr}</span></div>
    </div>`;
  }).join('');
}

// ── GRID ──
function makeGrid(){
  const g=[];
  for(let r=0;r<ROWS;r++){g[r]=[];for(let c=0;c<COLS;c++) g[r][c]=randSym();}
  return g;
}
function randSym(inclSc=true){
  if(inclSc&&Math.random()<.048) return SCATTER;
  return SYM_KEYS[Math.floor(Math.random()*SYM_KEYS.length)];
}

function makeCell(sym){
  const div=document.createElement('div'); div.className='cell';
  const bg=document.createElement('div'); bg.className='cell-bg'; div.appendChild(bg);
  const symEl=document.createElement('div'); symEl.className='cell-sym';
  if(SYMS[sym]) symEl.innerHTML=SYMS[sym];
  else symEl.innerHTML=`<svg viewBox="0 0 100 100"><text y="65" font-size="60" text-anchor="middle" x="50">${sym}</text></svg>`;
  div.appendChild(symEl);
  const glare=document.createElement('div'); glare.className='cell-glare'; div.appendChild(glare);
  if(sym===SCATTER) div.classList.add('scatter-idle');
  return div;
}

function renderGrid(g,dropCols=null){
  grid=g;
  const el=document.getElementById('grid'); el.innerHTML='';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=makeCell(g[r][c]); cell.id=`c${r}${c}`;
    if(dropCols&&dropCols.includes(c)){
      cell.classList.add('drop');
      const delay=(r*.055+c*.018+Math.random()*.03)+'s';
      cell.querySelectorAll('.cell-bg,.cell-sym,.cell-glare').forEach(x=>x.style.animationDelay=delay);
    }
    el.appendChild(cell);
  }
}

// ═══════════════════════════════════════════════════════════════════
//  SPIN LOOP
// ═══════════════════════════════════════════════════════════════════
async function spin(){
  if(isSpinning) return;
  const bet=BETS[betIdx];
  if(!isFSMode){ if(credit<bet){ setMsg('Not enough credits!',''); return; } credit-=bet; updateUI(); }
  isSpinning=true;
  document.getElementById('spin-btn').disabled=true;
  document.getElementById('spin-btn').classList.add('spinning');
  setMsg('🎰 Spinning…',''); roundWin=0; totalMult=1;
  document.getElementById('mult-val').textContent='×1';
  const ng=makeGrid();
  await animSpin(ng); renderGrid(ng); grid=ng; await sleep(300);
  const sc=countSym(grid,SCATTER);
  if(sc>=4) await bonusIntro(sc);
  else { await tumbleLoop(bet); endRound(); }
}

async function animSpin(ng){
  // column-by-column reveal
  for(let c=0;c<COLS;c++){
    await sleep(68);
    for(let r=0;r<ROWS;r++){
      const el=document.getElementById(`c${r}${c}`);
      if(!el) continue;
      const nc=makeCell(ng[r][c]);
      el.className=nc.className+' drop'; el.innerHTML=nc.innerHTML;
      const delay=(r*.04)+'s';
      el.querySelectorAll('.cell-bg,.cell-sym,.cell-glare').forEach(x=>x.style.animationDelay=delay);
    }
  }
  await sleep(420);
}

// ═══════════════════════════════════════════════════════════════════
//  TUMBLE MECHANIC
// ═══════════════════════════════════════════════════════════════════
async function tumbleLoop(bet){
  while(true){
    const wins=findWins(grid); if(!wins.length) break;
    const wSet=new Set(); wins.forEach(w=>w.pos.forEach(p=>wSet.add(p)));
    // highlight winners
    wSet.forEach(p=>{
      const [r,c]=[...p].map(Number); // 'rc' single char? use split
    });
    // actually parse positions
    const positions=[...wSet].map(p=>p.split('-').map(Number));
    positions.forEach(([r,c])=>{
      const el=document.getElementById(`c${r}${c}`);
      if(el){ el.classList.add('winning'); el.classList.remove('scatter-idle'); }
    });
    // spawn particles at grid center
    const gridEl=document.getElementById('grid');
    const rect=gridEl.getBoundingClientRect();
    spawnParticles(rect.left+rect.width/2, rect.top+rect.height/2, 12);

    let tw=wins.reduce((s,w)=>s+w.payout*bet,0);

    // bomb multiplier in free spins
    if(isFSMode&&Math.random()<.4){
      const vals=[2,3,5,8,10,25,50,100,500,1000];
      const bm=vals[Math.floor(Math.random()*vals.length)];
      totalMult*=bm;
      const mv=document.getElementById('mult-val');
      mv.textContent='×'+totalMult; mv.classList.remove('bump'); void mv.offsetWidth; mv.classList.add('bump');
      // chip on first winner
      if(positions[0]){
        const [r,c]=positions[0];
        const el=document.getElementById(`c${r}${c}`);
        if(el){ const chip=document.createElement('div');
          chip.style.cssText='position:absolute;top:-10px;right:-10px;background:linear-gradient(135deg,#ff4da6,#9b35e0);border:2px solid #fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;z-index:20;font-family:Lilita One,cursive;box-shadow:0 3px 12px rgba(0,0,0,.6);animation:chipPop .3s cubic-bezier(.34,1.56,.64,1)';
          chip.textContent='×'+bm; el.appendChild(chip); setTimeout(()=>chip.remove(),1700); }
      }
    }
    roundWin+=tw*(isFSMode?totalMult:1);
    await sleep(660);

    // remove winners
    positions.forEach(([r,c])=>{
      const el=document.getElementById(`c${r}${c}`);
      if(el){ el.classList.add('removing'); el.classList.remove('winning'); }
      grid[r][c]=null;
    });
    await sleep(360);
    await gravity();
    setMsg(`WIN  $${roundWin.toFixed(2)}`, roundWin>=BETS[betIdx]*10?'big':'');
    await sleep(300);
  }
}

async function gravity(){
  const changed=new Set();
  for(let c=0;c<COLS;c++){
    let col=[];
    for(let r=0;r<ROWS;r++) if(grid[r][c]!==null) col.push(grid[r][c]);
    while(col.length<ROWS) col.unshift(randSym(isFSMode));
    for(let r=0;r<ROWS;r++){ if(grid[r][c]!==col[r]) changed.add(c); grid[r][c]=col[r]; }
  }
  renderGrid(grid,[...changed]); await sleep(430);
}

function findWins(g){
  const cnt={},pos={};
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const s=g[r][c]; if(!s||s===SCATTER) continue;
    cnt[s]=(cnt[s]||0)+1; if(!pos[s]) pos[s]=[]; pos[s].push(`${r}-${c}`);
  }
  const wins=[];
  for(const sym of SYM_KEYS) if(cnt[sym]>=8){
    let br=8; for(let b=8;b<=15;b++) if(cnt[sym]>=b) br=b;
    wins.push({sym,count:cnt[sym],payout:PAY[sym][br]||PAY[sym][8],pos:pos[sym]});
  }
  return wins;
}
function countSym(g,s){ let n=0; for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(g[r][c]===s) n++; return n; }

// ═══════════════════════════════════════════════════════════════════
//  BONUS / FREE SPINS
// ═══════════════════════════════════════════════════════════════════
async function bonusIntro(sc){
  const extra=Math.min(sc-4,6); freeSpins=10+extra*2;
  isFSMode=true; totalMult=1;
  burstConfetti();
  showOv('FREE SPINS','🍭 Free Spins! 🍭',`${freeSpins} Spins Awarded!`);
  await sleep(2800); closeOverlay();
  document.getElementById('fs-bar').classList.add('show');
  document.getElementById('fs-count').textContent=freeSpins;
  await runFS();
}
async function runFS(){
  const bet=BETS[betIdx];
  while(freeSpins>0){
    freeSpins--; document.getElementById('fs-count').textContent=freeSpins;
    setMsg(`🍭 Free Spin — ${freeSpins} left`,'');
    const ng=makeGrid(); await animSpin(ng); renderGrid(ng); grid=ng; await sleep(280);
    const sc=countSym(grid,SCATTER);
    if(sc>=3){
      const b=(sc-2)*5; freeSpins+=b;
      document.getElementById('fs-count').textContent=freeSpins;
      showOv('RETRIGGER','🎉 Retrigger! 🎉',`+${b} Free Spins!`);
      await sleep(2000); closeOverlay();
    }
    await tumbleLoop(bet); await sleep(380);
  }
  isFSMode=false; totalMult=1;
  document.getElementById('fs-bar').classList.remove('show');
  document.getElementById('mult-val').textContent='×1';
  endRound();
}

function buyFS(isSuper){
  const bet=BETS[betIdx]; const cost=bet*(isSuper?500:100);
  if(credit<cost){ setMsg('Not enough credits!',''); return; }
  if(!confirm(`Buy ${isSuper?'Super ':''}Free Spins for $${cost.toFixed(2)}?`)) return;
  credit-=cost; freeSpins=isSuper?25:10; isFSMode=true; if(isSuper) totalMult=10;
  updateUI(); document.getElementById('fs-bar').classList.add('show');
  document.getElementById('fs-count').textContent=freeSpins;
  if(!isSpinning){
    isSpinning=true; document.getElementById('spin-btn').disabled=true;
    runFS().then(()=>{ isSpinning=false; document.getElementById('spin-btn').disabled=false; document.getElementById('spin-btn').classList.remove('spinning'); });
  }
}

// ═══════════════════════════════════════════════════════════════════
//  END ROUND
// ═══════════════════════════════════════════════════════════════════
function endRound(){
  isSpinning=false;
  document.getElementById('spin-btn').disabled=false;
  document.getElementById('spin-btn').classList.remove('spinning');
  const bet=BETS[betIdx];
  if(roundWin>0){
    credit+=roundWin;
    if(roundWin>=bet*30){ burstConfetti(); showOv('MEGA WIN','🍭 MEGA WIN! 🍭',`$${roundWin.toFixed(2)}`); }
    else if(roundWin>=bet*15){ burstConfetti(); showOv('BIG WIN','🎉 BIG WIN! 🎉',`$${roundWin.toFixed(2)}`); }
    else if(roundWin>=bet*8){ showOv('GREAT WIN','✨ Great Win! ✨',`$${roundWin.toFixed(2)}`); }
    else setMsg(`WIN  $${roundWin.toFixed(2)}`, roundWin>=bet*5?'big':'');
  } else setMsg('SPIN TO WIN!','');
  updateUI();
  if(isAuto&&!isFSMode) setTimeout(()=>{ if(isAuto&&!isFSMode) spin(); },1100);
}

// ═══════════════════════════════════════════════════════════════════
//  OVERLAY
// ═══════════════════════════════════════════════════════════════════
function showOv(type,title,amount){
  document.getElementById('ov-type').textContent=type;
  document.getElementById('ov-title').textContent=title;
  document.getElementById('ov-amount').textContent=amount;
  document.getElementById('win-overlay').classList.add('show');
}
function closeOverlay(){ document.getElementById('win-overlay').classList.remove('show'); }

// ═══════════════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════════════
function updateUI(){
  const bet=BETS[betIdx];
  ['bet-display','bet-small'].forEach(id=>document.getElementById(id).textContent='$'+bet.toFixed(2));
  document.getElementById('credit-el').textContent='$'+credit.toFixed(2);
  document.getElementById('buy-fs-price').textContent='$'+(bet*100).toFixed(2);
  document.getElementById('buy-super-price').textContent='$'+(bet*500).toFixed(2);
}
function chgBet(d){ if(isSpinning)return; betIdx=Math.max(0,Math.min(BETS.length-1,betIdx+d)); updateUI(); }
function toggleDouble(){
  doubleOn=!doubleOn;
  const btn=document.getElementById('double-btn');
  btn.classList.toggle('on',doubleOn);
  btn.querySelector('span').textContent=doubleOn?'ON':'OFF';
}
function toggleAuto(){
  isAuto=!isAuto;
  const btn=document.getElementById('auto-btn');
  btn.classList.toggle('on',isAuto);
  btn.textContent=isAuto?'⏸ STOP':'AUTO';
  if(isAuto&&!isSpinning) spin();
}
function setMsg(txt,cls){
  const el=document.getElementById('win-msg');
  el.textContent=txt; el.className=cls?`big`:'';
  el.id='win-msg';
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
function init(){
  buildPaytable();
  grid=makeGrid(); renderGrid(grid); updateUI();
}
init();

// ── VIEWPORT SCALE FIT ──────────────────────────
function scaleGame(){
  const shell = document.getElementById('game-shell');
  const padV = 24;
  const padH = 32;
  // Use offsetWidth/offsetHeight for actual rendered size
  const scaleX = (window.innerWidth  - padH) / shell.offsetWidth;
  const scaleY = (window.innerHeight - padV) / shell.offsetHeight;
  const scale  = Math.min(scaleX, scaleY, 1);
  shell.style.transform = `scale(${scale})`;
  shell.style.transformOrigin = 'top left';
  // Centre horizontally and vertically
  const scaledW = shell.offsetWidth  * scale;
  const scaledH = shell.offsetHeight * scale;
  shell.style.marginLeft = Math.max(0, (window.innerWidth  - scaledW) / 2) + 'px';
  shell.style.marginTop  = Math.max(0, (window.innerHeight - scaledH) / 2) + 'px';
}
scaleGame();
window.addEventListener('resize', scaleGame);
</script>
